# pytest configuration file: pytest.ini or .pytest.ini
[pytest]
# Specifies a minimal pytest version required for running tests
minversion = 9.0
# Sets list of directories that should be searched for tests when no specific directories,
# files or test ids are given in the command line when executing pytest from the rootdir directory
testpaths = .
# One or more Glob-style file patterns determining which python files are considered as test modules.
# Search for multiple glob patterns by adding a space between patterns:
python_files = test_*.py *_test.py
# Add the specified OPTS (options) to the set of command line arguments as if they had been specified by the user.
# [-x] means exiting instantly on first error or failed test.
# [-r] means showing extra test summary info as specified by chars:
# f: failed; E: error; s: skipped; x: xfailed; X: xpassed; p: passed; P: passed with output; a: all except passed (p/P); A: all; w: warnings (enabled by default); N: resets the list
addopts = -rA
