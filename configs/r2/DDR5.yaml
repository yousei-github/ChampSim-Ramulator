# Ramulator 2.0 DDR5 configuration
# Matches: standard=DDR5, channels=1, ranks=1, speed=DDR5_3200AN, org=DDR5_16Gb_x8.
#
# The Frontend is the ChampSim external_wrapper (empty tick, passthrough send) —
# ChampSim drives requests directly into the MemorySystem

Frontend:
  impl: ChampSim
  # clock_ratio: 8 # Unused, CPU frequency is defined in include/ChampSim/champsim_constants.h

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3 # Unused, automatically calculated in source/ChampSim/ramulator2_dram_controller.cc

  DRAM:
    impl: DDR5
    org:
      preset: DDR5_16Gb_x8
      channel: 1
      rank: 1
    timing:
      preset: DDR5_3200AN
    # The DDR5 model requires an RFM (Refresh Management) parameter group
    # (see source/Ramulator2/dram/impl/DDR5.cpp). BRC is the bounded-refresh count.
    RFM:
      BRC: 2

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    # OpenRowPolicy is used (not ClosedRowPolicy as in DDR4.yaml): ClosedRowPolicy
    # requires a "close-row" request alias that this model does not define.
    RowPolicy:
      impl: OpenRowPolicy
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
