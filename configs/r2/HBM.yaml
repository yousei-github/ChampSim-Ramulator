# Ramulator 2.0 HBM configuration
# Matches: standard=HBM, channels=1, speed=HBM_2Gbps, org=HBM_4Gb.
# HBM has no rank level (its org_presets encode bankgroup/bank directly).
#
# The Frontend is the ChampSim external_wrapper (empty tick, passthrough send) —
# ChampSim drives requests directly into the MemorySystem

Frontend:
  impl: ChampSim
  # clock_ratio: 8 # Unused, CPU frequency is defined in include/ChampSim/champsim_constants.h

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3 # Unused, automatically calculated in source/ChampSim/ramulator2_dram_controller.cc

  DRAM:
    impl: HBM
    org:
      preset: HBM_4Gb
      channel: 1
    timing:
      preset: HBM_2Gbps

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    # OpenRowPolicy is used (not ClosedRowPolicy as in DDR4.yaml): ClosedRowPolicy
    # requires rank + bankgroup levels and a "close-row" request, which this model
    # does not define.
    RowPolicy:
      impl: OpenRowPolicy
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
