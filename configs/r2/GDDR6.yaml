# Ramulator 2.0 GDDR6 configuration
# Matches: standard=GDDR6, channels=1, speed=GDDR6_2000_1250mV_quad, org=GDDR6_16Gb_x16.
# GDDR6 has no rank level (its org_presets encode bankgroup/bank directly).
#
# The Frontend is the ChampSim external_wrapper (empty tick, passthrough send) —
# ChampSim drives requests directly into the MemorySystem

Frontend:
  impl: ChampSim
  # clock_ratio: 8 # Unused, CPU frequency is defined in include/ChampSim/champsim_constants.h

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3 # Unused, automatically calculated in source/ChampSim/ramulator2_dram_controller.cc

  DRAM:
    impl: GDDR6
    org:
      # channel is not overridden: the GDDR6_16Gb_x16 preset already fixes the
      # channel count, and overriding it makes the model's density check fail.
      preset: GDDR6_16Gb_x16
    timing:
      preset: GDDR6_2000_1250mV_quad

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    # OpenRowPolicy is used (not ClosedRowPolicy as in DDR4.yaml): ClosedRowPolicy
    # requires rank + bankgroup levels and a "close-row" request, which this model
    # does not define.
    RowPolicy:
      impl: OpenRowPolicy
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
