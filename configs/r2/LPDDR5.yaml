# Ramulator 2.0 LPDDR5 configuration
# Matches: standard=LPDDR5, channels=1, ranks=1, speed=LPDDR5_6400, org=LPDDR5_8Gb_x16.
#
# The Frontend is the ChampSim external_wrapper (empty tick, passthrough send) —
# ChampSim drives requests directly into the MemorySystem

Frontend:
  impl: ChampSim
  # clock_ratio: 8 # Unused, CPU frequency is defined in include/ChampSim/champsim_constants.h

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3 # Unused, automatically calculated in source/ChampSim/ramulator2_dram_controller.cc

  DRAM:
    impl: LPDDR5
    org:
      preset: LPDDR5_8Gb_x16
      channel: 1
      rank: 1
    timing:
      preset: LPDDR5_6400

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    # OpenRowPolicy is used (not ClosedRowPolicy as in DDR4.yaml): ClosedRowPolicy
    # requires a "close-row" request alias that this model does not define.
    RowPolicy:
      impl: OpenRowPolicy
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
