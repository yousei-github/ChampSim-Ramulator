# Ramulator 2.0 DDR4 configuration
# Matches: standard=DDR4, channels=1, ranks=1, speed=DDR4_2400R, org=DDR4_4Gb_x8.
#
# The Frontend is the ChampSim external_wrapper (empty tick, passthrough send) —
# ChampSim drives requests directly into the MemorySystem

Frontend:
  impl: ChampSim
  # clock_ratio: 8 # Unused, CPU frequency is defined in include/ChampSim/champsim_constants.h

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3 # Unused, automatically calculated in source/ChampSim/ramulator2_dram_controller.cc

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_4Gb_x8
      channel: 1
      rank: 1
    timing:
      preset: DDR4_2400R

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: ClosedRowPolicy
      cap: 4
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
